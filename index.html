<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Martin Cueva | Artist</title>

    <style>
        /* ========================================
           GLOBAL STYLES
           Reset and base styles for the entire page
        ======================================== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Helvetica Neue', 'Helvetica', Arial, sans-serif;
            background-color: #000000;
            color: #ffffff;
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* ========================================
           NAVIGATION BAR
        ======================================== */
        nav {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background-color: rgba(0, 0, 0, 0.98);
            padding: 25px 0;
            z-index: 1000;
            border-bottom: 1px solid #222;
            backdrop-filter: blur(10px);
        }

        nav .container {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 40px;
        }

        /* ========================================
           LOGO SECTION
        ======================================== */
        .logo {
            font-size: 20px;
            font-weight: 400;
            letter-spacing: 3px;
            color: #ffffff;
            text-decoration: none;
            text-transform: uppercase;
            transition: opacity 0.3s ease;
        }

        .logo:hover {
            opacity: 0.7;
        }

        .logo img {
            height: 50px;
            width: auto;
        }

        /* ========================================
           NAVIGATION MENU
        ======================================== */
        nav ul {
            list-style: none;
            display: flex;
            gap: 40px;
            align-items: center;
        }

        nav ul li a {
            color: #ffffff;
            text-decoration: none;
            font-size: 13px;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-weight: 300;
            transition: color 0.3s ease;
            position: relative;
        }

        nav ul li a::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 0;
            height: 1px;
            background-color: #ffffff;
            transition: width 0.3s ease;
        }

        nav ul li a:hover::after {
            width: 100%;
        }

        nav ul li a:hover {
            color: #cccccc;
        }

        /* ========================================
           MOBILE HAMBURGER MENU
        ======================================== */
        .menu-toggle {
            display: none;
            flex-direction: column;
            cursor: pointer;
            gap: 6px;
            z-index: 1001;
        }

        .menu-toggle span {
            width: 28px;
            height: 2px;
            background-color: #ffffff;
            transition: all 0.3s ease;
        }

        /* ========================================
           HERO SECTION
        ======================================== */
        .hero {
            margin-top: 120px;
            padding: 80px 40px;
            text-align: center;
            max-width: 1200px;
            margin-left: auto;
            margin-right: auto;
        }

        .hero h1 {
            font-size: 56px;
            font-weight: 200;
            letter-spacing: 4px;
            margin-bottom: 30px;
            line-height: 1.2;
        }

        .hero .subtitle {
            font-size: 13px;
            color: #999999;
            letter-spacing: 3px;
            text-transform: uppercase;
            font-weight: 300;
            line-height: 1.8;
        }

        /* ========================================
           PHOTO GALLERY
        ======================================== */
        .gallery {
            max-width: 1400px;
            margin: 80px auto;
            padding: 0 40px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 30px;
        }

        /* Gallery item is now a link */
        .gallery-item {
            position: relative;
            overflow: hidden;
            aspect-ratio: 3/2;
            background-color: #111;
            cursor: pointer;
            border: 1px solid #1a1a1a;
            display: block;
            text-decoration: none;
            color: inherit;
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform 0.5s ease, opacity 0.3s ease;
            opacity: 0.9;
        }

        .gallery-item:hover img,
        .gallery-item:focus img {
            transform: scale(1.08);
            opacity: 1;
        }

        .gallery-item .caption {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
            padding: 30px 20px 20px;
            color: #ffffff;
            opacity: 0;
            transition: opacity 0.4s ease;
            pointer-events: none;
        }

        .gallery-item .caption p {
            font-size: 14px;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-weight: 300;
        }

        .gallery-item:hover .caption,
        .gallery-item:focus .caption {
            opacity: 1;
        }

        .gallery-item:focus {
            outline: 2px solid #ffffff;
            outline-offset: 4px;
        }

        /* ========================================
           FOOTER
        ======================================== */
        footer {
            text-align: center;
            padding: 60px 40px;
            border-top: 1px solid #222;
            margin-top: 100px;
            background-color: #000000;
        }

        footer p {
            font-size: 11px;
            color: #666666;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-weight: 300;
        }

        /* ========================================
           RESPONSIVE DESIGN - TABLET
        ======================================== */
        @media (max-width: 1024px) {
            nav .container {
                padding: 0 30px;
            }

            .hero {
                padding: 60px 30px;
            }

            .hero h1 {
                font-size: 42px;
            }

            .gallery {
                padding: 0 30px;
                grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
                gap: 20px;
            }
        }

        /* ========================================
           RESPONSIVE DESIGN - MOBILE
        ======================================== */
        @media (max-width: 768px) {
            nav {
                padding: 20px 0;
            }

            nav .container {
                padding: 0 20px;
            }

            nav ul {
                display: none;
                flex-direction: column;
                position: fixed;
                top: 0;
                left: 0;
                right: 0;
                bottom: 0;
                background-color: rgba(0, 0, 0, 0.98);
                padding: 100px 40px;
                gap: 30px;
                justify-content: flex-start;
            }

            nav ul.active {
                display: flex;
            }

            nav ul li a {
                font-size: 16px;
                letter-spacing: 3px;
            }

            .menu-toggle {
                display: flex;
            }

            .hero {
                margin-top: 80px;
                padding: 50px 20px;
            }

            .hero h1 {
                font-size: 28px;
                letter-spacing: 2px;
            }

            .hero .subtitle {
                font-size: 11px;
                letter-spacing: 2px;
            }

            .gallery {
                padding: 0 20px;
                grid-template-columns: 1fr;
                gap: 20px;
                margin: 50px auto;
            }

            .gallery-item {
                aspect-ratio: 4/3;
            }

            footer {
                padding: 40px 20px;
                margin-top: 60px;
            }
        }
    </style>
</head>
<body>

    <!-- ========================================
         NAVIGATION BAR
    ======================================== -->
    <nav>
        <div class="container">

            <!-- LOGO -->
            <a href="index.html" class="logo">Martin Cueva</a>

            <!-- OPTIONAL: Use image logo instead -->
            <!-- <a href="index.html" class="logo"><img src="" id="logoImage" alt="Martin Cueva Logo"></a> -->

            <!-- Mobile hamburger menu button -->
            <div class="menu-toggle" onclick="toggleMenu()">
                <span></span>
                <span></span>
                <span></span>
            </div>

            <!-- Navigation Menu -->
            <ul id="menu">
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About</a></li>
            </ul>
        </div>
    </nav>

    <!-- ========================================
         HERO SECTION
    ======================================== -->
    <section class="hero">
        <h1>- Visual Artist and Musician -</h1>
        <p class="subtitle">Fine Art Photography - Drawing and Painting - Music Interpretation</p>
    </section>

    <!-- ========================================
         PHOTO GALLERY
    ======================================== -->
    <section class="gallery" id="gallery">
        <!-- Gallery items will be inserted here by JavaScript -->
    </section>

    <!-- ========================================
         FOOTER
    ======================================== -->
    <footer>
        <p>© Martin Cueva - Copyright 2020</p>
    </footer>

    <!-- ========================================
         JAVASCRIPT
    ======================================== -->
    <script>
        const CONFIG = {
            // Optional logo image
            // logoImage: 'logo.png',

            galleryPhotos: [
                {
                    image: 'UrbanCover.jpg',
                    title: 'Nature and Urban Photography',
                    alt: 'Photography Portfolio Nature and Urban',
                    link: 'Gallery1.html'
                },
                {
                    image: 'AssignmentCover.jpg',
                    title: 'People Photography',
                    alt: 'Photography Portfolio People',
                    link: 'Gallery2.html'
                },
                {
                    image: 'BooksCover.jpg',
                    title: 'Books',
                    alt: 'Published Books',
                    link: 'Gallery3.html'
                },
                {
                    image: 'DrawingsCover.jpg',
                    title: 'Drawings',
                    alt: 'Drawings Portfolio',
                    link: 'Gallery4.html'
                },
                {
                    image: 'PaintingCover.jpg',
                    title: 'Paintings',
                    alt: 'Painting Portfolio',
                    link: 'Gallery5.html'
                },
                {
                    image: 'writingsCover.jpg',
                    title: 'Writings',
                    alt: 'Writings Portfolio',
                    link: 'Gallery6.html'
                }
            ]
        };

        /**
         * Load logo image if configured
         */
        function loadLogo() {
            if (CONFIG.logoImage) {
                const logoImg = document.getElementById('logoImage');
                if (logoImg) {
                    logoImg.src = CONFIG.logoImage;
                }
            }
        }

        /**
         * Dynamically create and load gallery images from CONFIG
         */
        function loadGallery() {
            const gallery = document.getElementById('gallery');
            gallery.innerHTML = '';

            CONFIG.galleryPhotos.forEach((photo, index) => {
                const pageLink = photo.link || `Gallery${index + 1}.html`;

                // Create gallery item as a clickable link
                const galleryItem = document.createElement('a');
                galleryItem.className = 'gallery-item';
                galleryItem.href = pageLink;
                galleryItem.setAttribute('aria-label', `Open ${photo.title}`);

                // Create image element
                const img = document.createElement('img');
                img.src = photo.image;
                img.alt = photo.alt;
                img.loading = 'lazy';
                img.decoding = 'async';

                // Create caption element
                const caption = document.createElement('div');
                caption.className = 'caption';

                const captionText = document.createElement('p');
                captionText.textContent = photo.title;
                caption.appendChild(captionText);

                // Assemble gallery item
                galleryItem.appendChild(img);
                galleryItem.appendChild(caption);

                // Add to gallery
                gallery.appendChild(galleryItem);
            });
        }

        /**
         * Toggle mobile menu open/closed
         */
        function toggleMenu() {
            const menu = document.getElementById('menu');
            menu.classList.toggle('active');
        }

        /**
         * Close mobile menu when clicking any menu link
         */
        function setupMenuLinks() {
            document.querySelectorAll('#menu a').forEach(link => {
                link.addEventListener('click', () => {
                    document.getElementById('menu').classList.remove('active');
                });
            });
        }

        /**
         * Initialize everything when page loads
         */
        window.addEventListener('DOMContentLoaded', () => {
            loadLogo();
            loadGallery();
            setupMenuLinks();
        });
    </script>

</body>
</html>
