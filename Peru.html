<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Peru | Martin Cueva</title>

    <style>
        /* ========================================
           GLOBAL STYLES
        ======================================== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background-color: #000;
            color: #fff;
            line-height: 1.6;
        }

        a {
            color: inherit;
            text-decoration: none;
        }

        /* ========================================
           NAVIGATION
        ======================================== */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            background: rgba(0, 0, 0, 0.98);
            padding: 25px 0;
            z-index: 1000;
            border-bottom: 1px solid #222;
            backdrop-filter: blur(10px);
        }

        nav .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 20px;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: #fff;
        }

        nav ul {
            list-style: none;
            display: flex;
            gap: 40px;
        }

        nav ul a {
            font-size: 13px;
            letter-spacing: 2px;
            text-transform: uppercase;
            position: relative;
        }

        nav ul a::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 0;
            height: 1px;
            background: #fff;
            transition: width 0.3s ease;
        }

        nav ul a:hover::after {
            width: 100%;
        }

        .menu-toggle {
            display: none;
            flex-direction: column;
            gap: 6px;
            cursor: pointer;
        }

        .menu-toggle span {
            width: 28px;
            height: 2px;
            background: #fff;
        }

        /* ========================================
           SERIES HEADER
        ======================================== */
        .series-header {
            margin-top: 120px;
            padding: 80px 40px 40px;
            text-align: center;
            max-width: 1000px;
            margin-left: auto;
            margin-right: auto;
        }

        .series-header h1 {
            font-size: 56px;
            font-weight: 200;
            letter-spacing: 4px;
            margin-bottom: 18px;
        }

        .series-meta {
            font-size: 12px;
            color: #666;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 20px;
        }

        .series-header p {
            font-size: 16px;
            color: #999;
            letter-spacing: 2px;
            line-height: 1.8;
        }

        .back-link {
            display: inline-block;
            margin-top: 20px;
            font-size: 12px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #999;
        }

        /* ========================================
           GALLERY (Selected Work style)
        ======================================== */
        .gallery {
            max-width: 1400px;
            margin: 70px auto 0;
            padding: 0 40px;
            column-count: 2;
            column-gap: 60px;
        }

        .photo {
            break-inside: avoid;
            margin-bottom: 60px;
            cursor: zoom-in;
        }

        .photo img {
            width: 100%;
            display: block;
            opacity: 0.92;
            transition: opacity 0.3s ease, transform 0.4s ease;
        }

        .photo:hover img {
            opacity: 1;
            transform: translateY(-2px);
        }

        /* ========================================
           LIGHTBOX
        ======================================== */
        .lightbox {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.95);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }

        .lightbox.active {
            display: flex;
        }

        .lightbox img {
            max-width: 90vw;
            max-height: 90vh;
            object-fit: contain;
        }

        .lb-nav,
        .lb-close {
            position: absolute;
            color: #fff;
            font-size: 24px;
            cursor: pointer;
            user-select: none;
        }

        .lb-prev { left: 40px; }
        .lb-next { right: 40px; }
        .lb-close {
            top: 30px;
            right: 40px;
            font-size: 14px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* ========================================
           FOOTER
        ======================================== */
        footer {
            margin-top: 120px;
            padding: 60px 40px;
            text-align: center;
            border-top: 1px solid #222;
        }

        footer p {
            font-size: 11px;
            color: #666;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* ========================================
           RESPONSIVE
        ======================================== */
        @media (max-width: 768px) {
            .gallery {
                column-count: 1;
                padding: 0 20px;
            }

            .series-header h1 {
                font-size: 32px;
            }

            nav ul {
                display: none;
                position: fixed;
                inset: 0;
                background: #000;
                padding: 100px 40px;
                flex-direction: column;
            }

            nav ul.active {
                display: flex;
            }

            .menu-toggle {
                display: flex;
            }
        }
    </style>
</head>

<body>

<nav>
    <div class="container">
        <a href="index.html" class="logo">Martin Cueva</a>

        <div class="menu-toggle" onclick="toggleMenu()">
            <span></span><span></span><span></span>
        </div>

        <ul id="menu">
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="series.html">Series</a></li>
        </ul>
    </div>
</nav>

<section class="series-header">
    <h1>Peru</h1>
    <div class="series-meta">2024 | 45 Images</div>
    <p>
        A photographic exploration of Peru focusing on light, contrast, and the
        relationship between people, architecture, and landscape.
    </p>
    <a href="series.html" class="back-link">← Back to Series</a>
</section>

<section class="gallery" id="gallery"></section>

<footer>
    <p>© Martin Cueva</p>
</footer>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox">
    <span class="lb-close" onclick="closeLightbox()">Close</span>
