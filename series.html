<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Series | Your Name</title>

    <style>
        /* ========================================
           GLOBAL STYLES
        ======================================== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background-color: #000;
            color: #fff;
            line-height: 1.6;
        }

        /* ========================================
           NAVIGATION
        ======================================== */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            background: rgba(0, 0, 0, 0.98);
            padding: 25px 0;
            z-index: 1000;
            border-bottom: 1px solid #222;
            backdrop-filter: blur(10px);
        }

        nav .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 20px;
            letter-spacing: 3px;
            text-transform: uppercase;
            text-decoration: none;
            color: white;
        }

        nav ul {
            list-style: none;
            display: flex;
            gap: 40px;
        }

        nav ul a {
            font-size: 13px;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-decoration: none;
            color: white;
            position: relative;
        }

        nav ul a::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 0;
            height: 1px;
            background: white;
            transition: width .3s ease;
        }

        nav ul a:hover::after {
            width: 100%;
        }

        .menu-toggle {
            display: none;
            flex-direction: column;
            gap: 6px;
            cursor: pointer;
        }

        .menu-toggle span {
            width: 28px;
            height: 2px;
            background: white;
        }

        /* ========================================
           HEADER
        ======================================== */
        .series-header {
            margin-top: 120px;
            padding: 80px 40px;
            text-align: center;
            max-width: 900px;
            margin-left: auto;
            margin-right: auto;
        }

        .series-header h1 {
            font-size: 56px;
            font-weight: 200;
            letter-spacing: 4px;
            margin-bottom: 30px;
        }

        .series-header p {
            color: #999;
            letter-spacing: 2px;
        }

        /* ========================================
           SERIES GRID
        ======================================== */
        .series-grid {
            max-width: 1400px;
            margin: 60px auto;
            padding: 0 40px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(450px, 1fr));
            gap: 60px;
        }

        .series-card {
            transition: transform .3s ease;
        }

        .series-card:hover {
            transform: translateY(-5px);
        }

        .series-image {
            aspect-ratio: 4 / 3;
            overflow: hidden;
            border: 1px solid #1a1a1a;
            margin-bottom: 25px;
            position: relative;
        }

        .series-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.85;
            transition: transform .5s ease, opacity .3s ease;
        }

        .series-card:hover img {
            transform: scale(1.05);
            opacity: 1;
        }

        .series-info h2 {
            font-size: 28px;
            font-weight: 300;
            letter-spacing: 2px;
            margin-bottom: 10px;
        }

        .series-meta {
            font-size: 12px;
            color: #666;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 15px;
        }

        .series-info p {
            color: #999;
            font-size: 15px;
        }

        /* ========================================
           FOOTER
        ======================================== */
        footer {
            text-align: center;
            padding: 60px 40px;
            border-top: 1px solid #222;
            margin-top: 100px;
        }

        footer p {
            font-size: 11px;
            letter-spacing: 2px;
            color: #666;
        }

        /* ========================================
           MOBILE
        ======================================== */
        @media (max-width: 768px) {
            .series-header h1 {
                font-size: 32px;
            }

            .series-grid {
                grid-template-columns: 1fr;
                padding: 0 20px;
            }

            .menu-toggle {
                display: flex;
            }

            nav ul {
                display: none;
                position: fixed;
                inset: 0;
                background: black;
                padding: 100px 40px;
                flex-direction: column;
            }

            nav ul.active {
                display: flex;
            }
        }
    </style>
</head>

<body>

<nav>
    <div class="container">
        <a href="index.html" class="logo">YOUR NAME</a>

        <div class="menu-toggle" onclick="toggleMenu()">
            <span></span><span></span><span></span>
        </div>

        <ul id="menu">
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="series.html">Series</a></li>
        </ul>
    </div>
</nav>

<section class="series-header">
    <h1>Series</h1>
    <p>Ongoing and completed photographic series exploring urban life, light, and solitude.</p>
</section>

<section class="series-grid" id="seriesGrid"></section>

<footer>
    <p>© YOUR NAME</p>
</footer>

<script>
const CONFIG = {
    series: [
        {
            title: 'Metropolis',
            image: 'series-1.jpg',
            year: '2024',
            imageCount: '45 Images',
            link: 'metropolis.html',
            description: 'Urban architecture and geometry explored through minimalist composition.'
        },
        {
            title: 'Shadows',
            image: 'series-2.jpg',
            year: '2023',
            imageCount: '32 Images',
            link: 'shadows.html',
            description: 'A study of contrast, abstraction, and negative space.'
        },
        {
            title: 'Solitude',
            image: 'series-3.jpg',
            year: '2023',
            imageCount: '28 Images',
            link: 'solitude.html',
            description: 'Isolation within crowded urban environments.'
        },
        {
            title: 'Nocturne',
            image: 'series-4.jpg',
            year: '2022–2024',
            imageCount: '52 Images | Ongoing',
            link: 'nocturne.html',
            description: 'The city transformed by artificial light at night.'
        }
    ]
};

function loadSeries() {
    const grid = document.getElementById('seriesGrid');

    CONFIG.series.forEach(series => {
        const card = document.createElement('div');
        card.className = 'series-card';

        const imageLink = document.createElement('a');
        imageLink.href = series.link;

        const imageDiv = document.createElement('div');
        imageDiv.className = 'series-image';

        const img = document.createElement('img');
        img.src = series.image;
        img.alt = series.title;

        imageDiv.appendChild(img);
        imageLink.appendChild(imageDiv);

        const info = document.createElement('div');
        info.className = 'series-info';

        info.innerHTML = `
            <h2>${series.title}</h2>
            <p class="series-meta">${series.year} | ${series.imageCount}</p>
            <p>${series.description}</p>
        `;

        card.appendChild(imageLink);
        card.appendChild(info);
        grid.appendChild(card);
    });
}

function toggleMenu() {
    document.getElementById('menu').classList.toggle('active');
}

document.addEventListener('DOMContentLoaded', loadSeries);
</script>

</body>
</html>
